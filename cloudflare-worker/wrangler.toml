# cloudflare-worker/wrangler.toml (이 파일을 수정하는 대신, `wrangler init` 후 생성되는 `wrangler.toml`을 이 예시처럼 수정하면 됩니다.)

# Workers 프로젝트의 이름. Cloudflare 대시보드에서 보일 이름입니다.
name = "gemini-proxy-worker" # 여기에 사용자님이 정한 Workers 스크립트 이름을 넣으세요.

# Workers 코드의 진입점 파일. 보통 src/index.js 또는 src/index.ts 입니다.
main = "src/index.js" # 이 경로는 워커 프로젝트 폴더(예: 'worker') 내부를 기준으로 합니다.

# Workers 런타임 호환성 날짜. 최신 날짜로 유지하는 것이 좋습니다.
compatibility_date = "2024-05-27" # 오늘 날짜 또는 최신 날짜로 설정하세요.

# ===========================================================================
# 환경 변수 설정 (Secrets 권장)
# ===========================================================================

# Gemini 모델 이름을 Workers 설정에 직접 넣고 싶다면 [vars] 섹션을 사용합니다.
# 하지만 Gemini API 키는 절대로 여기에 직접 노출하지 마세요!
[vars]
GEMINI_MODEL_SECRET = "gemini-1.5-flash" # Gemini 모델 이름 (예: gemini-1.5-flash, gemini-pro)

# Gemini API 키를 안전하게 등록하는 방법:
# 1. 터미널에서 'wrangler secret put GEMINI_API_KEY_SECRET' 명령을 실행합니다.
# 2. 터미널이 키를 입력하라는 메시지를 표시하면 실제 Gemini API 키를 붙여넣고 Enter를 누릅니다.
# 3. 'GEMINI_API_KEY_SECRET' 이 변수 이름은 index.js 코드에서 사용된 이름과 정확히 일치해야 합니다.
#    (index.js 코드에서는 `env.GEMINI_API_KEY_SECRET` 와 같이 `env` 객체를 통해 접근하게 됩니다.)
# 4. 이제 Workers는 배포될 때 이 Secret 값을 안전하게 가져와 사용합니다.

# ===========================================================================
# 개발 환경 설정 (선택 사항)
# ===========================================================================

# 로컬 개발 환경에서 Workers를 테스트할 때 사용합니다.
# [dev]
# ip = "127.0.0.1"
# port = 8787
# local_protocol = "http"

# ===========================================================================
# 타입스크립트 사용 시 (선택 사항)
# ===========================================================================

# Workers 코드에 TypeScript를 사용한다면 다음 설정을 추가할 수 있습니다.
# [build]
# command = "npx tsc --build"
# watch = ["src"]
# upload.format = "modules"
# upload.main = "dist/index.mjs" # `npx tsc --build` 후 생성되는 파일 경로

# 참고: 타입스크립트 사용 시에는 `main` 경로와 `build` 설정을 맞춰주어야 합니다.
# 이 가이드에서는 단순화를 위해 JavaScript(.js) 기준으로 설명합니다.
